name: Lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Format and Clippy
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install simplex-cli via simplexup
        shell: bash
        run: |
          curl -L https://smplx.simplicity-lang.org | bash
          export PATH="$PATH:$HOME/.simplex/bin"
          echo "$HOME/.simplex/bin" >> "$GITHUB_PATH"
          simplexup
          simplex --version

      - name: Generate contract artifacts
        shell: bash
        run: |
          cd crates/contracts
          simplex build
          test -f src/artifacts/mod.rs

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
