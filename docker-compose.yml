services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: crates/indexer/Dockerfile
      target: migrate
    restart: "no"
    env_file:
      - .env
    command: ["sqlx", "migrate", "run"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: crates/indexer/Dockerfile
      target: runtime
    env_file:
      - .env
    environment:
      APP_ENVIRONMENT: production
      RUN_MODE: api
      DATABASE__HOST: postgres
      DATABASE__PORT: ${POSTGRES_PORT}
      DATABASE__USERNAME: ${POSTGRES_USER}
      DATABASE__PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE__DATABASE_NAME: ${POSTGRES_DB}
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - 8000

  indexer:
    build:
      context: .
      dockerfile: crates/indexer/Dockerfile
      target: runtime
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENVIRONMENT: production
      RUN_MODE: indexer
      DATABASE__HOST: postgres
      DATABASE__PORT: ${POSTGRES_PORT}
      DATABASE__USERNAME: ${POSTGRES_USER}
      DATABASE__PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE__DATABASE_NAME: ${POSTGRES_DB}
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_ESPLORA_BASE_URL: ${VITE_ESPLORA_BASE_URL}
        VITE_ESPLORA_EXPLORER_URL: ${VITE_ESPLORA_EXPLORER_URL}
    restart: unless-stopped
    ports:
      - '${WEB_PORT}:80'
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
