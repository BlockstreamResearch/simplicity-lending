[workspace]
resolver = "3"
members = [
    "crates/*"
]

[workspace.package]
license = "MIT OR Apache-2.0"
edition = "2024"

[workspace.lints.clippy]
multiple_crate_versions = "allow"

[workspace.dependencies]
ring = "0.17.14"
sha2 = { version = "0.10.9", features = ["compress"] }

hex = "0.4.3"
tracing = { version = "0.1.41" }

modular-bitfield = { version = "0.13.1"}

simplicityhl = { version = "0.4.0" }
simplicityhl-core = { version = "0.4.1", features = ["encoding"] }

simplicity-contracts = { git = "https://github.com/BlockstreamResearch/simplicity-contracts.git", rev = "87f89e9", package = "contracts" }

cargo-husky = { version = "1.5.0", default-features = false, features = ["user-hooks"] }
